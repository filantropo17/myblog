# Nginx config — serves static frontends, proxies API.
# Place at /etc/nginx/conf.d/default.conf in the nginx container.

upstream myblog_api {
  server myblog-api:8787;
  keepalive 32;
}

server {
  listen 80;
  server_name _;

  # Public blog (Astro static)
  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-XSS-Protection "1; mode=block" always;

  # Cache static assets aggressively
  location ~* \.(?:css|js|woff2?|ttf|otf|eot|ico|svg|png|jpg|jpeg|gif|webp|avif)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # API proxy
  location /api/ {
    proxy_pass http://myblog_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
  }

  # Admin panel (separate path)
  location /admin {
    alias /usr/share/nginx/admin;
    try_files $uri $uri/ /admin/index.html;
  }

  # Public site fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss image/svg+xml;
}
