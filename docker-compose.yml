# docker-compose.yml — one-click MyBlog deployment
services:
  myblog-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: myblog-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8787
      - DB_PATH=/data/myblog.db
      - AI_API_KEY=${AI_API_KEY:-change-me-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - RATE_LIMIT_WRITES_PER_MINUTE=30
      # LLM（OpenAI 兼容，可选；仅作用于站内 /chat 对话；留空走模板）
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_TIMEOUT_MS=${LLM_TIMEOUT_MS:-30000}
    volumes:
      - ./data:/data
    deploy:
      resources:
        limits:
          memory: 400M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: myblog-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./apps/web/dist:/usr/share/nginx/html:ro
      - ./apps/admin/dist:/usr/share/nginx/admin:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      myblog-api:
        condition: service_healthy

